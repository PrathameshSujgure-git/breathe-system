<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Breathe System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F5F2ED;
      --fg: #333333;
      --fg-soft: #8A9A8F;
      --fg-faint: #B4B4A6;
      --fg-ghost: rgba(51,51,51,0.08);
      --timer-color: rgba(51,51,51,0.22);
      --btn-bg: rgba(255,255,255,0.85);
      --btn-shadow: 0 1px 6px rgba(0,0,0,0.06), 0 0 1px rgba(0,0,0,0.04);
      --btn-shadow-hover: 0 2px 10px rgba(0,0,0,0.09), 0 0 1px rgba(0,0,0,0.06);
    }
    html.dark {
      --bg: #1A1A18;
      --fg: #E8E6E1;
      --fg-soft: #7A8A7F;
      --fg-faint: #555550;
      --fg-ghost: rgba(232,230,225,0.06);
      --timer-color: rgba(232,230,225,0.15);
      --btn-bg: rgba(255,255,255,0.08);
      --btn-shadow: 0 1px 6px rgba(0,0,0,0.3), 0 0 1px rgba(0,0,0,0.2);
      --btn-shadow-hover: 0 2px 10px rgba(0,0,0,0.4), 0 0 1px rgba(0,0,0,0.3);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      flex-shrink: 0;
    }

    .brand {
      font-family: 'DM Mono', 'SF Mono', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg);
    }

    .header-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--fg);
      width: 28px; height: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.5;
      transition: opacity 0.3s;
      padding: 0;
    }
    .icon-btn:hover { opacity: 0.9; }

    /* ── Main Content ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ── Idle State ── */
    #idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    #idle.hide {
      opacity: 0;
      transform: translateY(-10px);
      pointer-events: none;
      position: absolute;
    }

    #idle-title {
      font-size: clamp(1.3rem, 3.5vw, 1.8rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    #idle-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: var(--fg-faint);
      text-transform: uppercase;
      max-width: 280px;
      text-align: center;
      line-height: 1.8;
    }

    .btn-begin {
      margin-top: 1.5rem;
      background: var(--fg);
      border: none;
      color: var(--bg);
      padding: 0.7rem 2.4rem;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-begin:hover { opacity: 0.85; transform: scale(1.02); }
    .btn-begin:active { transform: scale(0.98); }

    /* ── Session State ── */
    #session {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
      position: absolute;
      inset: 0;
      justify-content: center;
    }
    #session.show {
      opacity: 1;
      pointer-events: auto;
    }

    #phase {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg);
      transition: opacity 0.35s ease;
    }

    #meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--fg-faint);
      margin-top: 0.6rem;
    }

    #timer {
      font-size: clamp(7rem, 25vw, 14rem);
      font-weight: 200;
      letter-spacing: -0.04em;
      color: var(--timer-color);
      font-variant-numeric: tabular-nums;
      line-height: 0.85;
      margin-top: 2rem;
      user-select: none;
    }

    /* ── Footer / Controls ── */
    footer {
      flex-shrink: 0;
      padding: 0 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* Protocol bar */
    #protocol {
      display: flex;
      justify-content: center;
      gap: 3rem;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    #protocol.show { opacity: 1; }

    .proto-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
    .proto-num {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--fg-faint);
      letter-spacing: -0.02em;
    }
    .proto-num.active { color: var(--fg); }
    .proto-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--fg-faint);
    }
    .proto-label.active { color: var(--fg-soft); }

    /* Bottom controls */
    #bottom-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #bottom-controls.show {
      opacity: 1;
      pointer-events: auto;
    }

    .ctrl-btn {
      background: var(--btn-bg);
      border: none;
      color: var(--fg);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--btn-shadow);
      transition: all 0.25s ease;
      padding: 0;
    }
    .ctrl-btn:hover { box-shadow: var(--btn-shadow-hover); }
    .ctrl-btn:active { transform: scale(0.95); }

    #btn-pause {
      width: 52px; height: 52px;
      border-radius: 14px;
    }
    #btn-stop {
      width: 36px; height: 36px;
      border-radius: 10px;
      opacity: 0.5;
    }
    #btn-stop:hover { opacity: 0.8; }

    /* Progress arc */
    #progress-arc {
      width: 36px; height: 36px;
      opacity: 0.4;
    }
    #progress-arc svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    #progress-arc circle {
      fill: none;
      stroke-width: 2;
    }
    #progress-arc .track { stroke: var(--fg-ghost); }
    #progress-arc .fill {
      stroke: var(--fg-faint);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.4s ease;
    }

    /* ── Completion ── */
    #completion {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
      position: absolute;
      inset: 0;
      justify-content: center;
    }
    #completion.show {
      opacity: 1;
      pointer-events: auto;
    }
    #complete-title {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    #complete-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg-faint);
    }
    #complete-timer {
      font-size: clamp(7rem, 25vw, 14rem);
      font-weight: 200;
      letter-spacing: -0.04em;
      color: var(--timer-color);
      line-height: 0.85;
      margin-top: 1rem;
    }

    /* ── Idle controls placeholder ── */
    #idle-footer {
      display: flex;
      justify-content: center;
      padding: 0 1.5rem 2.5rem;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    #idle-footer.hide { opacity: 0; pointer-events: none; }

    .idle-protocol {
      display: flex;
      gap: 3rem;
    }
  </style>
</head>
<body>

  <header>
    <span class="brand">Breathe System</span>
    <div class="header-actions">
      <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="icon-btn" id="fs-toggle" title="Fullscreen" aria-label="Toggle fullscreen">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
    </div>
  </header>

  <main>
    <!-- Idle -->
    <div id="idle">
      <div id="idle-title">Nervous System Reset</div>
      <div id="idle-sub">Longer exhale tells your body<br>the danger has passed</div>
      <div style="display:flex;gap:3rem;margin-top:0.5rem">
        <div class="proto-item">
          <span class="proto-num">4</span>
          <span class="proto-label">Inhale</span>
        </div>
        <div class="proto-item">
          <span class="proto-num">2</span>
          <span class="proto-label">Hold</span>
        </div>
        <div class="proto-item">
          <span class="proto-num">6</span>
          <span class="proto-label">Exhale</span>
        </div>
      </div>
      <button class="btn-begin" id="btn-start">Begin</button>
    </div>

    <!-- Session -->
    <div id="session">
      <div id="phase">Inhale</div>
      <div id="meta">Phase 01 — 1 of 10</div>
      <div id="timer">04</div>
    </div>

    <!-- Completion -->
    <div id="completion">
      <div id="complete-title">Complete</div>
      <div id="complete-sub">Take a moment before returning</div>
      <div id="complete-timer">00</div>
    </div>
  </main>

  <footer>
    <!-- Protocol indicators during session -->
    <div id="protocol">
      <div class="proto-item" id="pi-0">
        <span class="proto-num" id="pn-0">4</span>
        <span class="proto-label" id="pl-0">Inhale</span>
      </div>
      <div class="proto-item" id="pi-1">
        <span class="proto-num" id="pn-1">2</span>
        <span class="proto-label" id="pl-1">Hold</span>
      </div>
      <div class="proto-item" id="pi-2">
        <span class="proto-num" id="pn-2">6</span>
        <span class="proto-label" id="pl-2">Exhale</span>
      </div>
    </div>

    <!-- Controls -->
    <div id="bottom-controls">
      <button class="ctrl-btn" id="btn-pause" title="Pause">
        <svg id="pause-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="7" y="5" width="3" height="14" rx="1"/><rect x="14" y="5" width="3" height="14" rx="1"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-stop" title="Stop">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      </button>
      <div id="progress-arc">
        <svg viewBox="0 0 36 36">
          <circle class="track" cx="18" cy="18" r="15.5"/>
          <circle class="fill" id="progress-ring" cx="18" cy="18" r="15.5" stroke-dasharray="97.39" stroke-dashoffset="97.39"/>
        </svg>
      </div>
    </div>
  </footer>

  <script>
    // ── Breathing ──
    const PHASES = [
      { name: 'Inhale', duration: 4 },
      { name: 'Hold', duration: 2 },
      { name: 'Exhale', duration: 6 },
    ];
    const TOTAL_ROUNDS = 10;
    const CYCLE = PHASES.reduce((s, p) => s + p.duration, 0);
    const CIRC = 2 * Math.PI * 15.5;

    const state = {
      running: false,
      paused: false,
      completed: false,
      round: 1,
      phaseIndex: 0,
      phaseElapsed: 0,
      lastTimestamp: null,
    };

    // ── Elements ──
    const elIdle = document.getElementById('idle');
    const elSession = document.getElementById('session');
    const elPhase = document.getElementById('phase');
    const elMeta = document.getElementById('meta');
    const elTimer = document.getElementById('timer');
    const elProtocol = document.getElementById('protocol');
    const elControls = document.getElementById('bottom-controls');
    const elCompletion = document.getElementById('completion');
    const progressRing = document.getElementById('progress-ring');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const pauseIcon = document.getElementById('pause-icon');
    const btnStop = document.getElementById('btn-stop');
    const btnTheme = document.getElementById('theme-toggle');
    const themeIcon = document.getElementById('theme-icon');
    const btnFs = document.getElementById('fs-toggle');

    // ── Theme ──
    let isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (isDark) document.documentElement.classList.add('dark');
    updateThemeIcon();

    function updateThemeIcon() {
      themeIcon.innerHTML = isDark
        ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
        : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    }

    btnTheme.addEventListener('click', () => {
      isDark = !isDark;
      document.documentElement.classList.toggle('dark', isDark);
      updateThemeIcon();
    });

    btnFs.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    });

    // ── State transitions ──
    function showSession() {
      elIdle.classList.add('hide');
      elCompletion.classList.remove('show');
      setTimeout(() => {
        elSession.classList.add('show');
        elProtocol.classList.add('show');
        elControls.classList.add('show');
      }, 300);
    }

    function showIdle() {
      elSession.classList.remove('show');
      elProtocol.classList.remove('show');
      elControls.classList.remove('show');
      elCompletion.classList.remove('show');
      setTimeout(() => elIdle.classList.remove('hide'), 300);
    }

    function showCompletion() {
      elSession.classList.remove('show');
      elControls.classList.remove('show');
      setTimeout(() => {
        elCompletion.classList.add('show');
        // Keep protocol visible
      }, 500);
    }

    // ── Protocol highlighting ──
    function updateProtocol(activeIndex) {
      for (let i = 0; i < 3; i++) {
        const num = document.getElementById('pn-' + i);
        const label = document.getElementById('pl-' + i);
        if (i === activeIndex) {
          num.classList.add('active');
          label.classList.add('active');
        } else {
          num.classList.remove('active');
          label.classList.remove('active');
        }
      }
    }

    // ── Tick ──
    let prevPhase = -1;

    function tick(dt) {
      if (!state.running || state.paused || state.completed) return;

      state.phaseElapsed += dt;
      const phase = PHASES[state.phaseIndex];

      if (state.phaseElapsed >= phase.duration) {
        state.phaseElapsed -= phase.duration;
        state.phaseIndex++;
        if (state.phaseIndex >= PHASES.length) {
          state.phaseIndex = 0;
          state.round++;
          if (state.round > TOTAL_ROUNDS) {
            state.completed = true;
            return;
          }
        }
      }
    }

    function updateUI() {
      if (!state.running) return;

      if (state.completed) {
        showCompletion();
        state.running = false;
        updateProtocol(-1);
        progressRing.style.strokeDashoffset = '0';
        return;
      }

      const phase = PHASES[state.phaseIndex];

      // Phase name with fade
      if (state.phaseIndex !== prevPhase) {
        elPhase.style.opacity = '0';
        setTimeout(() => {
          elPhase.textContent = phase.name;
          elPhase.style.opacity = '1';
        }, 180);
        prevPhase = state.phaseIndex;
        updateProtocol(state.phaseIndex);
      }

      // Meta line
      const phaseNum = String(state.phaseIndex + 1).padStart(2, '0');
      elMeta.textContent = `Phase ${phaseNum} \u2014 ${state.round} of ${TOTAL_ROUNDS}`;

      // Timer - zero-padded
      const remaining = Math.ceil(phase.duration - state.phaseElapsed);
      elTimer.textContent = String(remaining).padStart(2, '0');

      // Progress ring
      const totalElapsed = (state.round - 1) * CYCLE +
        PHASES.slice(0, state.phaseIndex).reduce((s, p) => s + p.duration, 0) +
        state.phaseElapsed;
      const progress = totalElapsed / (TOTAL_ROUNDS * CYCLE);
      progressRing.style.strokeDashoffset = CIRC * (1 - progress);
    }

    function resetState() {
      state.running = false;
      state.paused = false;
      state.completed = false;
      state.round = 1;
      state.phaseIndex = 0;
      state.phaseElapsed = 0;
      state.lastTimestamp = null;
      prevPhase = -1;
    }

    // ── Events ──
    btnStart.addEventListener('click', () => {
      resetState();
      state.running = true;
      showSession();
    });

    btnPause.addEventListener('click', () => {
      state.paused = !state.paused;
      if (state.paused) {
        pauseIcon.innerHTML = '<polygon points="8,5 19,12 8,19"/>';
        btnPause.title = 'Resume';
      } else {
        pauseIcon.innerHTML = '<rect x="7" y="5" width="3" height="14" rx="1"/><rect x="14" y="5" width="3" height="14" rx="1"/>';
        btnPause.title = 'Pause';
        state.lastTimestamp = null;
      }
    });

    btnStop.addEventListener('click', () => {
      resetState();
      showIdle();
      pauseIcon.innerHTML = '<rect x="7" y="5" width="3" height="14" rx="1"/><rect x="14" y="5" width="3" height="14" rx="1"/>';
    });

    // Restart from completion
    elCompletion.addEventListener('click', () => {
      resetState();
      state.running = true;
      elCompletion.classList.remove('show');
      setTimeout(() => showSession(), 400);
    });

    // ── Loop ──
    function frame(timestamp) {
      if (state.running && !state.paused && !state.completed) {
        const dt = state.lastTimestamp ? (timestamp - state.lastTimestamp) / 1000 : 0;
        state.lastTimestamp = timestamp;
        tick(dt);
      }
      updateUI();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
